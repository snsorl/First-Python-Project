<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Messages</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav>
    <a href="/">Home</a> |
    <a href="/messages.html">Messages</a>
  </nav>

  <h1>Messages (saved in SQLite)</h1>

  <input id="text" placeholder="Type something..." />
  <button id="save">Save</button>

  <ul id="list"></ul>

  <script>
    // Fetch all messages from the Python backend and render them
    async function load() {
      const res = await fetch("/api/messages");
      const data = await res.json();
      document.getElementById("list").innerHTML =
        data.map(m => `<li>#${m.id} — ${m.text}</li>`).join("");
    }

    // Send a new message to the Python backend (POST)
    document.getElementById("save").onclick = async () => {
      const input = document.getElementById("text");
      await fetch("/api/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ text: input.value })
      });
      input.value = "";
      load();
    };

    load();
  </script>
</body>
</html>
